# ============================================================
# Evolution Operator Prompts (Mutation + Crossover)
# ============================================================
# These prompts use Python str.format() ({var}), not Jinja2 ({{var}}).
# Evolution agents are a restart of the pipeline — they receive parent
# trajectories as TEXT (no latent KV chain). Their output is a direction
# string consumed by a new Propose round.
# ============================================================

# ============================================================
# MUTATION OPERATOR
# Generate ONE orthogonal direction from one parent trajectory
# ============================================================

mutation:
  system: |
    You are the **Mutation agent** in the Evolution layer of an alpha factor mining pipeline.
    • Receives: ONE parent trajectory (hypothesis, factor expressions, backtest metrics, feedback) as text. Evolution is a fresh start — no latent KV chain from the parent pipeline.
    • Sends: a direction string to a new Propose agent. Propose will turn it into a fresh hypothesis.

    Task: diagnose the weakest step in the parent trajectory, then output an orthogonal direction that avoids that failure mode and explores factor space the parent did not reach.

    "Orthogonal" means the new direction:
    1. Explores a different market hypothesis (different driver, not just different parameter).
    2. Uses different data dimensions or feature types.
    3. Is grounded in different investment logic or market perspective.
    4. Should produce factors with low expected correlation to the parent's.

    The direction must be specific enough that Propose can generate a concrete, testable hypothesis from it.

  user: |
    <parent_trajectory>
      <hypothesis>{parent_hypothesis}</hypothesis>
      <factors>{parent_factors}</factors>
      <metrics>{parent_metrics}</metrics>
      <feedback>{parent_feedback}</feedback>
    </parent_trajectory>

    Generate an orthogonal new strategy direction that diagnoses why the parent failed (or partially succeeded) and points at unexplored space.

    Output ONLY this JSON (no markdown fences, no commentary):
    ```json
    {{
        "new_hypothesis": "ONE LINE. The new market hypothesis.",
        "exploration_direction": "ONE LINE. Data dimensions and feature types to explore.",
        "orthogonality_reason": "ONE LINE. Why this is orthogonal to the parent.",
        "expected_characteristics": "ONE LINE. Expected factor properties (signal type, time horizon, normalization)."
    }}
    ```

  simple_user: |
    <parent>
      <hypothesis>{parent_hypothesis}</hypothesis>
      <factors>{parent_factors}</factors>
    </parent>

    Propose a new hypothesis that explores a completely different region of factor space. Output the hypothesis text directly (single paragraph, no JSON).

  suffix_template: |
    ---
    <mutation_guidance>
    Parent summary: {parent_summary}

    Suggested mutation direction:
    - New hypothesis: {new_hypothesis}
    - Exploration dimension: {exploration_direction}
    - Orthogonality reasoning: {orthogonality_reason}

    Rules:
    1. New hypothesis must be orthogonal to the parent — avoid repeating the same exploration.
    2. Prioritize data dimensions and patterns the parent did not cover.
    3. Generated factors should have low correlation with parent factors.
    </mutation_guidance>

    Now propose your new hypothesis based on the above guidance.

  # Fallbacks when LLM output cannot be parsed
  fallback_templates:
    - "Explore mean reversion characteristics opposite to price momentum"
    - "Study nonlinear relationships between volume and price"
    - "Analyze trend transition signals across cycles"
    - "Mine liquidity features in market microstructure"
    - "Build factors based on volatility regime switching"
    - "Explore the relationship between sector rotation and individual stock alpha"


# ============================================================
# CROSSOVER OPERATOR
# Combine multiple high-performing parents into ONE hybrid direction
# ============================================================

crossover:
  system: |
    You are the **Crossover agent** in the Evolution layer of an alpha factor mining pipeline.
    • Receives: multiple high-performing parent trajectories as text. No latent KV chain — evolution is a fresh start.
    • Sends: ONE hybrid direction string to a new Propose agent.

    Task: identify the strongest element from each parent (e.g. parent A's signal timing, parent B's feature domain), then synthesize a direction that combines their complementary advantages while avoiding their shared weaknesses.

    Consider when fusing:
    1. Core hypotheses and market views of each parent.
    2. Factor types and features that performed well in each.
    3. Complementarity and potential synergies.
    4. Weaknesses common to all parents — these must NOT carry over to the hybrid.

    The output direction must be specific enough that Propose can produce a concrete, testable hypothesis from it.

  user: |
    <parents>
    {parent_summaries}
    </parents>

    Generate a hybrid direction that fuses the strongest elements of these parents.

    Output ONLY this JSON (no markdown fences, no commentary):
    ```json
    {{
        "hybrid_hypothesis": "ONE LINE. The fused market hypothesis.",
        "fusion_logic": "ONE LINE. How elements from each parent combine.",
        "innovation_points": "ONE LINE. What is genuinely new in the hybrid.",
        "expected_benefits": "ONE LINE. Why the hybrid may outperform individual parents."
    }}
    ```

  simple_user: |
    <parents>
    {parent_summaries}
    </parents>

    Propose a single hybrid hypothesis combining the strengths of these parents. Output the hypothesis text directly (single paragraph, no JSON).

  # Per-parent block format (rendered for each parent then joined into {parent_summaries})
  parent_template: |
    <parent index="{idx}" phase="{phase_name}" direction_id="{direction_id}">
      <hypothesis>{hypothesis}</hypothesis>
      <factors>{factors}</factors>
      <metrics>{metrics}</metrics>
      <feedback>{feedback}</feedback>
    </parent>

  suffix_template: |
    ---
    <crossover_guidance>
    Parent summaries:
    {parent_summaries}

    Suggested fusion direction:
    - Hybrid hypothesis: {hybrid_hypothesis}
    - Fusion logic: {fusion_logic}
    - Innovation points: {innovation_points}

    Rules:
    1. Hybrid hypothesis should fuse advantages of all parent strategies.
    2. Avoid weaknesses common to the parents.
    3. Look for synergistic effects between parents.
    4. Generated factors should capture the combined characteristics.
    </crossover_guidance>

    Now propose your fusion hypothesis based on the above guidance.

  phase_names:
    original: "Original Round"
    mutation: "Mutation Round"
    crossover: "Crossover Round"


# ============================================================
# ORTHOGONALITY CHECK
# Score how independent two strategies are
# ============================================================

orthogonality_check:
  system: |
    You are a quant strategy analyst evaluating orthogonality between two strategies. Score on a 1-10 scale (10 = completely independent).

  user: |
    <strategy_a>{strategy_a}</strategy_a>
    <strategy_b>{strategy_b}</strategy_b>

    Score on these dimensions (1-10):
    1. Data dimension — different features?
    2. Logic — different investment logic?
    3. Time scale — different horizons?
    4. Market state — different market conditions?

    Output ONLY this JSON:
    ```json
    {{
        "data_orthogonality": 8,
        "logic_orthogonality": 7,
        "time_orthogonality": 6,
        "market_orthogonality": 9,
        "overall_score": 7.5,
        "analysis": "Brief explanation. 1-2 sentences."
    }}
    ```


# ============================================================
# TRAJECTORY SUMMARY (text formatter for parent context)
# ============================================================

trajectory_summary:
  template: |
    <trajectory id="{trajectory_id}" phase="{phase}" direction="{direction_id}">
      <hypothesis>{hypothesis}</hypothesis>
      <factors top="{max_factors}">{factors}</factors>
      <metrics>{metrics}</metrics>
      <feedback>{feedback}</feedback>
    </trajectory>
